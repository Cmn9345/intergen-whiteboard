<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心情溫度計 - 代間共學互動平台</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .mood-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .mood-header {
      padding: var(--space-lg) var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mood-header-left {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .week-pill {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      background: var(--color-postit-yellow);
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--wobble-2);
      padding: 8px 8px 8px 20px;
      font-weight: 700;
      font-family: var(--font-heading);
      font-size: var(--font-size-lg);
      box-shadow: var(--shadow-sketch-sm);
    }

    .week-pill span { white-space: nowrap; }

    .week-pill-nav {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-text-secondary);
      background: var(--color-bg-card);
      transition: all var(--transition-fast);
    }

    .week-pill-nav:hover {
      background: var(--color-primary-lighter);
      color: var(--color-primary);
    }

    .mood-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
      padding: 0 var(--space-xl) var(--space-xl);
    }

    /* =========================================
       LEFT: Thermometer with 3 clickable zones
       ========================================= */
    .thermo-section {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: var(--space-xl);
    }

    .thermo-wrapper {
      position: relative;
      width: 140px;
      height: 480px;
      flex-shrink: 0;
    }

    /* Tube */
    .thermo-tube {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      height: 380px;
      top: 0;
      border-radius: 32px 32px 8px 8px;
      background: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      overflow: hidden;
      box-shadow: var(--shadow-sketch-sm);
    }

    /* Bulb at bottom */
    .thermo-bulb {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      box-shadow: var(--shadow-sketch);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thermo-bulb-inner {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--color-happy);
      border: 2px solid var(--color-border);
      transition: background 0.3s ease;
    }

    /* Three clickable zones inside the tube */
    .thermo-zone {
      position: absolute;
      left: 0;
      right: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      z-index: 5;
    }

    .thermo-zone:hover {
      filter: brightness(1.1);
      transform: scale(1.03);
    }

    .thermo-zone:active {
      transform: scale(0.97);
    }

    /* Zone positions (bottom to top: angry, sad, happy) */
    .thermo-zone-angry {
      bottom: 0;
      height: 33.33%;
      background: var(--color-angry);
      border-radius: 0 0 8px 8px;
    }

    .thermo-zone-sad {
      bottom: 33.33%;
      height: 33.33%;
      background: var(--color-sad);
    }

    .thermo-zone-happy {
      top: 0;
      height: 33.33%;
      background: var(--color-happy);
      border-radius: 28px 28px 0 0;
    }

    .thermo-zone-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.2));
    }

    /* Selected state */
    .thermo-zone.selected {
      outline: 4px solid var(--color-marker-black);
      outline-offset: -4px;
      z-index: 6;
    }

    /* Labels on the side */
    .thermo-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 380px;
      padding: 0;
    }

    .thermo-label {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      cursor: pointer;
      padding: var(--space-md) var(--space-lg);
      border: var(--border-width) solid var(--color-border);
      background: var(--color-bg-card);
      box-shadow: var(--shadow-sketch-sm);
      transition: all var(--transition-fast);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: var(--font-size-xl);
    }

    .thermo-label:nth-child(1) {
      border-radius: var(--wobble-1);
      border-left: 6px solid var(--color-happy);
    }
    .thermo-label:nth-child(2) {
      border-radius: var(--wobble-2);
      border-left: 6px solid var(--color-sad);
    }
    .thermo-label:nth-child(3) {
      border-radius: var(--wobble-3);
      border-left: 6px solid var(--color-angry);
    }

    .thermo-label:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-sketch);
    }

    .thermo-label:active {
      transform: translate(2px, 2px);
      box-shadow: var(--shadow-sketch-pressed);
    }

    .thermo-label.selected {
      background: var(--color-postit-yellow);
    }

    .thermo-label-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      flex-shrink: 0;
    }

    .thermo-label:nth-child(1) .thermo-label-dot { background: var(--color-happy); }
    .thermo-label:nth-child(2) .thermo-label-dot { background: var(--color-sad); }
    .thermo-label:nth-child(3) .thermo-label-dot { background: var(--color-angry); }

    .thermo-label-text {
      display: flex;
      flex-direction: column;
    }

    .thermo-label-name {
      font-size: var(--font-size-xl);
    }

    .thermo-label-desc {
      font-size: var(--font-size-base);
      color: var(--color-text-muted);
      font-weight: 400;
    }

    /* Tick marks on tube */
    .thermo-tube::before,
    .thermo-tube::after {
      content: '';
      position: absolute;
      right: 6px;
      width: 12px;
      height: 2px;
      background: rgba(0,0,0,0.15);
      z-index: 6;
    }
    .thermo-tube::before { top: 33.33%; }
    .thermo-tube::after { top: 66.66%; }

    /* === Right: Stats === */
    .stats-section {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .stats-card {
      background: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--wobble-1);
      padding: var(--space-xl);
      box-shadow: var(--shadow-sketch);
    }

    .stats-title {
      font-size: var(--font-size-xl);
      font-weight: 700;
      font-family: var(--font-heading);
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    /* Donut chart */
    .chart-container {
      display: flex;
      align-items: center;
      gap: var(--space-xl);
    }

    .donut-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      flex-shrink: 0;
    }

    .donut-wrapper svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .donut-total {
      font-size: var(--font-size-3xl);
      font-weight: 700;
      font-family: var(--font-heading);
    }

    .donut-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
    }

    .chart-legend {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      flex: 1;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--font-size-lg);
    }

    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 2px solid var(--color-border);
      flex-shrink: 0;
    }

    .legend-dot-happy { background: var(--color-happy); }
    .legend-dot-sad { background: var(--color-sad); }
    .legend-dot-angry { background: var(--color-angry); }

    .legend-name {
      flex: 1;
      font-weight: 700;
      font-family: var(--font-heading);
    }

    .legend-count {
      font-weight: 700;
      font-family: var(--font-heading);
    }

    .legend-pct {
      color: var(--color-text-muted);
      font-size: var(--font-size-base);
      min-width: 48px;
      text-align: right;
    }

    /* Voter list */
    .voter-list-title {
      font-size: var(--font-size-lg);
      font-weight: 700;
      font-family: var(--font-heading);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .voter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .voter-tag {
      padding: 6px 16px;
      border-radius: var(--wobble-2);
      font-size: var(--font-size-base);
      font-weight: 700;
      font-family: var(--font-heading);
      border: 2px solid var(--color-border);
    }

    .voter-tag-happy { background: var(--color-happy-light); }
    .voter-tag-sad { background: var(--color-sad-light); }
    .voter-tag-angry { background: var(--color-angry-light); }

    /* === Member Selection Modal === */
    .member-modal-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-sm);
      max-height: 340px;
      overflow-y: auto;
    }

    @media (max-width: 900px) {
      .mood-body {
        grid-template-columns: 1fr;
      }
      .thermo-section {
        flex-direction: column;
      }
      .thermo-labels {
        flex-direction: row;
        height: auto;
        width: 100%;
      }
      .thermo-label {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="mood-page">
    <div class="mood-header">
      <div class="mood-header-left">
        <a href="index.html" class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          返回
        </a>
        <h1 class="page-title">心情溫度計</h1>
      </div>
      <div class="week-pill">
        <span id="week-label">第 1 週</span>
        <button class="week-pill-nav" onclick="prevWeek()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="week-pill-nav" onclick="nextWeek()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <div class="mood-body">
      <!-- Left: Thermometer -->
      <div class="thermo-section">
        <div class="thermo-wrapper">
          <div class="thermo-tube">
            <!-- Three clickable zones inside tube -->
            <div class="thermo-zone thermo-zone-happy" onclick="selectMood('happy')" title="開心">
              <div class="thermo-zone-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              </div>
            </div>
            <div class="thermo-zone thermo-zone-sad" onclick="selectMood('sad')" title="難過">
              <div class="thermo-zone-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              </div>
            </div>
            <div class="thermo-zone thermo-zone-angry" onclick="selectMood('angry')" title="生氣">
              <div class="thermo-zone-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><path d="M7.5 8 10 9"/><path d="M16.5 8 14 9"/></svg>
              </div>
            </div>
          </div>
          <!-- Bulb -->
          <div class="thermo-bulb">
            <div class="thermo-bulb-inner" id="thermo-bulb-inner"></div>
          </div>
        </div>

        <!-- Labels next to thermometer -->
        <div class="thermo-labels">
          <div class="thermo-label" onclick="selectMood('happy')">
            <div class="thermo-label-dot"></div>
            <div class="thermo-label-text">
              <div class="thermo-label-name">開心</div>
              <div class="thermo-label-desc">今天心情很好</div>
            </div>
          </div>
          <div class="thermo-label" onclick="selectMood('sad')">
            <div class="thermo-label-dot"></div>
            <div class="thermo-label-text">
              <div class="thermo-label-name">難過</div>
              <div class="thermo-label-desc">今天有點低落</div>
            </div>
          </div>
          <div class="thermo-label" onclick="selectMood('angry')">
            <div class="thermo-label-dot"></div>
            <div class="thermo-label-text">
              <div class="thermo-label-name">生氣</div>
              <div class="thermo-label-desc">今天不太開心</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Stats -->
      <div class="stats-section">
        <div class="stats-card">
          <div class="stats-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
            投票統計
          </div>
          <div class="chart-container">
            <div class="donut-wrapper">
              <svg viewBox="0 0 36 36" id="donut-chart">
                <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--color-surface)" stroke-width="3.8"/>
              </svg>
              <div class="donut-center">
                <div class="donut-total" id="total-votes">0</div>
                <div class="donut-label">總票數</div>
              </div>
            </div>
            <div class="chart-legend" id="chart-legend">
              <div class="legend-item">
                <div class="legend-dot legend-dot-happy"></div>
                <span class="legend-name">開心</span>
                <span class="legend-count" id="count-happy">0</span>
                <span class="legend-pct" id="pct-happy">0%</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot legend-dot-sad"></div>
                <span class="legend-name">難過</span>
                <span class="legend-count" id="count-sad">0</span>
                <span class="legend-pct" id="pct-sad">0%</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot legend-dot-angry"></div>
                <span class="legend-name">生氣</span>
                <span class="legend-count" id="count-angry">0</span>
                <span class="legend-pct" id="pct-angry">0%</span>
              </div>
            </div>
          </div>
        </div>

        <div class="stats-card" style="border-radius:var(--wobble-3)">
          <div class="stats-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            投票名單
          </div>
          <div id="voter-lists">
            <div style="margin-bottom:var(--space-md)">
              <div class="voter-list-title">
                <div class="legend-dot legend-dot-happy"></div> 開心 (<span id="list-happy-count">0</span>)
              </div>
              <div class="voter-tags" id="list-happy"></div>
            </div>
            <div style="margin-bottom:var(--space-md)">
              <div class="voter-list-title">
                <div class="legend-dot legend-dot-sad"></div> 難過 (<span id="list-sad-count">0</span>)
              </div>
              <div class="voter-tags" id="list-sad"></div>
            </div>
            <div>
              <div class="voter-list-title">
                <div class="legend-dot legend-dot-angry"></div> 生氣 (<span id="list-angry-count">0</span>)
              </div>
              <div class="voter-tags" id="list-angry"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Member Selection Modal -->
    <div class="modal-overlay" id="member-modal">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title" id="modal-mood-title">選擇成員</div>
          <button class="btn btn-icon btn-ghost" onclick="closeModal()" style="border:2px solid var(--color-border);box-shadow:none;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="tab-nav" id="modal-group-tabs" style="margin-bottom:var(--space-md)"></div>

        <div class="member-modal-grid" id="modal-member-list"></div>

        <div style="margin-top:var(--space-lg)">
          <button class="btn btn-primary btn-lg" style="width:100%" id="vote-btn" disabled onclick="submitVote()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            確認投票
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    let students = [];
    let grouped = {};
    let moods = [];
    let currentWeek = 1;
    let selectedMood = null;
    let selectedMember = null;
    let modalGroup = '1';
    let votedNames = new Set();

    const moodColors = {
      happy: 'var(--color-happy)',
      sad: 'var(--color-sad)',
      angry: 'var(--color-angry)'
    };

    async function init() {
      students = await api.getStudents() || [];
      grouped = api.groupStudents(students);
      await loadMoods();
    }

    function prevWeek() { if (currentWeek > 1) { currentWeek--; updateWeekUI(); loadMoods(); } }
    function nextWeek() { if (currentWeek < 9) { currentWeek++; updateWeekUI(); loadMoods(); } }
    function updateWeekUI() { document.getElementById('week-label').textContent = `第 ${currentWeek} 週`; }

    async function loadMoods() {
      moods = await api.getMoods(String(currentWeek));
      votedNames = new Set(moods.map(m => m.Name));
      updateStats();
    }

    function updateStats() {
      const happy = moods.filter(m => m.emotional && m.emotional.includes('happy') || m.emotional && m.emotional.includes('sun'));
      const sad = moods.filter(m => m.emotional && (m.emotional.includes('sad') || m.emotional.includes('cloudy')));
      const angry = moods.filter(m => m.emotional && (m.emotional.includes('angry') || m.emotional.includes('storm') || m.emotional.includes('rain')));

      const total = moods.length || 1;

      document.getElementById('total-votes').textContent = moods.length;
      document.getElementById('count-happy').textContent = happy.length;
      document.getElementById('count-sad').textContent = sad.length;
      document.getElementById('count-angry').textContent = angry.length;
      document.getElementById('pct-happy').textContent = Math.round(happy.length / total * 100) + '%';
      document.getElementById('pct-sad').textContent = Math.round(sad.length / total * 100) + '%';
      document.getElementById('pct-angry').textContent = Math.round(angry.length / total * 100) + '%';

      updateDonut(happy.length, sad.length, angry.length);

      renderVoterList('list-happy', 'list-happy-count', happy, 'voter-tag-happy');
      renderVoterList('list-sad', 'list-sad-count', sad, 'voter-tag-sad');
      renderVoterList('list-angry', 'list-angry-count', angry, 'voter-tag-angry');
    }

    function updateDonut(h, s, a) {
      const total = h + s + a || 1;
      const hPct = h / total * 100;
      const sPct = s / total * 100;
      const aPct = a / total * 100;

      const chart = document.getElementById('donut-chart');
      chart.innerHTML = `
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--color-surface)" stroke-width="3.8"/>
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--color-happy)" stroke-width="3.8"
          stroke-dasharray="${hPct} ${100 - hPct}" stroke-dashoffset="0" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--color-sad)" stroke-width="3.8"
          stroke-dasharray="${sPct} ${100 - sPct}" stroke-dashoffset="${-hPct}" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--color-angry)" stroke-width="3.8"
          stroke-dasharray="${aPct} ${100 - aPct}" stroke-dashoffset="${-(hPct + sPct)}" stroke-linecap="round"/>
      `;
    }

    function renderVoterList(containerId, countId, items, tagClass) {
      document.getElementById(countId).textContent = items.length;
      document.getElementById(containerId).innerHTML = items.length === 0
        ? '<span style="color:var(--color-text-muted);font-size:var(--font-size-base)">尚無投票</span>'
        : items.map(m => `<span class="voter-tag ${tagClass}">${m.Name}</span>`).join('');
    }

    function selectMood(mood) {
      selectedMood = mood;

      // Update thermometer zone highlight
      document.querySelectorAll('.thermo-zone').forEach(z => z.classList.remove('selected'));
      document.querySelector(`.thermo-zone-${mood}`).classList.add('selected');

      // Update label highlight
      document.querySelectorAll('.thermo-label').forEach(l => l.classList.remove('selected'));
      const labels = document.querySelectorAll('.thermo-label');
      const labelIndex = { happy: 0, sad: 1, angry: 2 };
      labels[labelIndex[mood]].classList.add('selected');

      // Update bulb color
      const bulb = document.getElementById('thermo-bulb-inner');
      bulb.style.background = `var(--color-${mood})`;

      // Open member selection modal
      const titles = { happy: '開心', sad: '難過', angry: '生氣' };
      document.getElementById('modal-mood-title').textContent = `投票：${titles[mood]}`;
      selectedMember = null;
      renderModalTabs();
      renderModalMembers();
      openModal();
    }

    function openModal() {
      document.getElementById('member-modal').classList.add('active');
      document.getElementById('vote-btn').disabled = true;
    }

    function closeModal() {
      document.getElementById('member-modal').classList.remove('active');
    }

    function renderModalTabs() {
      const groups = Object.keys(grouped).sort();
      document.getElementById('modal-group-tabs').innerHTML = groups.map(g =>
        `<button class="tab-item ${g === modalGroup ? 'active' : ''}" onclick="switchModalGroup('${g}')">第 ${g} 組</button>`
      ).join('');
    }

    function switchModalGroup(g) {
      modalGroup = g;
      selectedMember = null;
      renderModalTabs();
      renderModalMembers();
      document.getElementById('vote-btn').disabled = true;
    }

    function renderModalMembers() {
      const members = grouped[modalGroup] || [];
      document.getElementById('modal-member-list').innerHTML = members.map(m => {
        const name = m.Name || m.name;
        const voted = votedNames.has(name);
        const sel = selectedMember && (selectedMember.Name || selectedMember.name) === name;
        return `
          <div class="member-card ${voted ? 'checked' : ''} ${sel ? 'selected' : ''}"
               onclick="${voted ? '' : `pickMember('${name}')`}">
            <div class="avatar avatar-sm">${name[0]}</div>
            <div class="member-card-name" style="font-size:var(--font-size-base)">${name}</div>
            ${voted ? '<span class="check-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>' : ''}
          </div>`;
      }).join('');
    }

    function pickMember(name) {
      const all = [...(grouped[modalGroup] || [])];
      selectedMember = all.find(m => (m.Name || m.name) === name);
      renderModalMembers();
      document.getElementById('vote-btn').disabled = false;
    }

    async function submitVote() {
      if (!selectedMember || !selectedMood) return;
      const name = selectedMember.Name || selectedMember.name;
      const group = selectedMember.group || selectedMember.Group || modalGroup;
      const emotionalMap = { happy: 'sun/happy', sad: 'cloudy-sun/sad', angry: 'storm/angry' };

      try {
        await api.voteMood(name, group, String(currentWeek), emotionalMap[selectedMood]);
        closeModal();
        showToast(`${name} 投票成功！`, 'success');
        await loadMoods();
      } catch (err) {
        if (err.message === 'DUPLICATE') {
          showToast(`${name} 本週已投票過了`, 'warning');
        } else {
          showToast('投票失敗，請重試', 'error');
        }
      }
    }

    init();
  </script>
</body>
</html>
