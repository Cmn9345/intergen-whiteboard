<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合唱合奏 - 代間共學互動平台</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .activity-page { max-width: 1000px; margin: 0 auto; padding: var(--space-xl); }
    .activity-title { text-align: center; margin-bottom: var(--space-xl); }
    .activity-title h1 { font-size: var(--font-size-4xl); font-family: var(--font-heading); }
    .activity-title p { color: var(--color-text-secondary); font-size: var(--font-size-xl); margin-top: var(--space-xs); }

    .songs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-lg); }
    .song-card { background: var(--color-bg-card); border: var(--border-width) solid var(--color-border); border-radius: var(--wobble-1); padding: var(--space-xl); display: flex; align-items: center; gap: var(--space-lg); cursor: pointer; transition: all var(--transition-fast); box-shadow: var(--shadow-sketch); }
    .song-card:nth-child(2n) { border-radius: var(--wobble-2); }
    .song-card:nth-child(3n) { border-radius: var(--wobble-3); }
    .song-card:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-sketch-hover); }
    .song-card:nth-child(1) { background: var(--color-postit-yellow); }
    .song-card:nth-child(2) { background: var(--color-postit-pink); }
    .song-card:nth-child(3) { background: var(--color-postit-blue); }
    .song-card:nth-child(4) { background: var(--color-postit-green); }
    .song-card:nth-child(5) { background: #F3E5F5; }
    .song-card:nth-child(6) { background: #FFF3E0; }
    .song-emoji { font-size: 48px; flex-shrink: 0; }
    .song-info h3 { font-family: var(--font-heading); font-size: var(--font-size-2xl); font-weight: 700; }
    .song-info p { color: var(--color-text-muted); font-size: var(--font-size-base); }
    .song-play { color: var(--color-text-muted); flex-shrink: 0; transition: transform var(--transition-fast); }
    .song-card:hover .song-play { transform: scale(1.2); color: var(--color-marker-black); }

    .video-player { display: none; margin-bottom: var(--space-xl); }
    .video-player.show { display: block; }
    .video-header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-md); }
    .video-header-bar h2 { font-family: var(--font-heading); font-size: var(--font-size-2xl); }
    .video-container { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: var(--wobble-1); border: var(--border-width) solid var(--color-border); overflow: hidden; box-shadow: var(--shadow-sketch); background: #000; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    .nav-footer { text-align: center; padding: var(--space-xl) 0; }

    @media (max-width: 768px) { .songs-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="activity-page">
      <div style="margin-bottom: var(--space-lg);">
        <a href="course-detail.html?week=5" class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          回到第 5 週
        </a>
      </div>

      <div class="activity-title">
        <h1>🎶 合唱合奏</h1>
        <p>選一首歌，大家一起唱！</p>
      </div>

      <div class="video-player" id="video-player">
        <div class="video-header-bar">
          <h2 id="video-title">🎵</h2>
          <button class="btn btn-outline" onclick="closeVideo()">✕ 關閉</button>
        </div>
        <div class="video-container">
          <iframe id="video-iframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen title="合唱合奏"></iframe>
        </div>
      </div>

      <div class="songs-grid stagger" id="songs-grid"></div>

      <div class="nav-footer">
        <a href="course-detail.html?week=5" class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          回到課程列表
        </a>
      </div>
    </div>
  </div>

  <script>
    const songs = [
      { name: '河馬歌', emoji: '🦛', videoId: '1OjkOZ7HhFc', desc: '可愛的河馬歌' },
      { name: 'A Ram Sam Sam', emoji: '🎵', videoId: 't59wPLPdzcM', desc: '經典律動歌曲' },
      { name: '擁抱世界擁抱你', emoji: '🤗', videoId: 'rBvJ3CFnnQU', desc: '溫暖的擁抱歌' },
      { name: '人人做環保', emoji: '♻️', videoId: '-Cmj65rNdok', desc: '環保小尖兵' },
      { name: '捏泥巴', emoji: '🏺', videoId: 'qn_0T9gerCA', desc: '手作泥巴歌' },
      { name: '丟丟銅仔', emoji: '🎼', videoId: 'baRAM0RVhn8', desc: '台灣民謠經典' },
    ];

    const playIcon = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';

    document.getElementById('songs-grid').innerHTML = songs.map((s, i) => `
      <div class="song-card animate-fade-in" onclick="playSong(${i})">
        <span class="song-emoji">${s.emoji}</span>
        <div class="song-info">
          <h3>${s.name}</h3>
          <p>${s.desc}</p>
        </div>
        <div class="song-play">${playIcon}</div>
      </div>
    `).join('');

    function playSong(index) {
      const s = songs[index];
      document.getElementById('video-title').textContent = `🎵 ${s.name}`;
      document.getElementById('video-iframe').src = `https://www.youtube.com/embed/${s.videoId}?autoplay=1&feature=oembed`;
      document.getElementById('video-player').classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closeVideo() {
      document.getElementById('video-iframe').src = '';
      document.getElementById('video-player').classList.remove('show');
    }
  </script>
</body>
</html>
