<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程內容 - 代間共學互動平台</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .courses-header {
      text-align: center;
      padding: var(--space-sm) var(--space-xl) 0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
    }

    .courses-header .icon-box {
      margin: 0;
    }

    .courses-header-text h1 {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      font-family: var(--font-heading);
      transform: rotate(-0.5deg);
    }

    .courses-header-text p {
      color: var(--color-text-secondary);
      font-size: var(--font-size-base);
      margin-top: 0;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      max-width: 100%;
      margin: 0 auto;
      padding: var(--space-sm) var(--space-xl);
      flex: 1;
      align-content: center;
    }

    .course-card {
      background: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      border-radius: 16px;
      padding: var(--space-lg) var(--space-xl);
      cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: 2px 3px 0 rgba(0,0,0,0.08);
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    /* Post-it background colors */
    .course-card:nth-child(1) { background: var(--color-postit-green); }
    .course-card:nth-child(2) { background: #F0ECF8; }
    .course-card:nth-child(3) { background: var(--color-postit-yellow); }
    .course-card:nth-child(4) { background: var(--color-postit-pink); }
    .course-card:nth-child(5) { background: var(--color-postit-blue); }
    .course-card:nth-child(6) { background: var(--color-sad-light); }
    .course-card:nth-child(7) { background: var(--color-secondary-lighter); }
    .course-card:nth-child(8) { background: var(--color-primary-lighter); }
    .course-card:nth-child(9) { background: #F3E5F5; }

    .course-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 5px 0 rgba(0,0,0,0.12);
    }

    .course-card:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.06);
    }

    .course-icon {
      width: 96px;
      height: 96px;
      min-width: 96px;
      border-radius: 50%;
      overflow: hidden;
    }

    .course-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .course-info {
      flex: 1;
      min-width: 0;
    }

    .course-week {
      font-size: var(--font-size-base);
      font-weight: 700;
      font-family: var(--font-heading);
      color: var(--color-text-muted);
      margin-bottom: 2px;
    }

    .course-name {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      font-family: var(--font-heading);
      line-height: 1.3;
      white-space: nowrap;
    }

    .course-desc {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    .course-arrow {
      color: var(--color-text-muted);
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }

    .course-arrow svg {
      width: 28px;
      height: 28px;
    }

    .course-card:hover .course-arrow {
      color: var(--color-marker-black);
      transform: translateX(4px);
    }

    .courses-back {
      text-align: center;
      padding: var(--space-xs) 0 var(--space-sm);
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .courses-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .courses-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="courses-header">
      <div class="icon-box icon-box-lg" style="background:#F0ECF8;color:#8B7EC8;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
          <path d="M8 7h6"/>
          <path d="M8 11h8"/>
        </svg>
      </div>
      <div class="courses-header-text">
        <h1>課程內容</h1>
        <p>9 週代間共學精彩課程</p>
      </div>
    </div>

    <div class="courses-grid stagger" id="courses-grid"></div>

    <div class="courses-back">
      <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        返回首頁
      </a>
    </div>
  </div>

  <script>
    const courses = [
      { week: 1, name: '相見歡', desc: '建立小默契、分組、破冰活動', icon: 'handshake' },
      { week: 2, name: '心情溫度計', desc: '情緒探索、心情表達、情感連結', icon: 'heart' },
      { week: 3, name: '夢想經驗大碰撞', desc: '職業探索、繪本故事、夢想分享', icon: 'lightbulb' },
      { week: 4, name: '我的家人', desc: '家人稱呼、你演我猜、家庭照', icon: 'sparkles' },
      { week: 5, name: '功夫大比拼', desc: '才藝表演、合唱合奏、互相欣賞', icon: 'music' },
      { week: 6, name: '玩具時光機', desc: '古早玩具、現代玩具、傳統遊戲', icon: 'camera' },
      { week: 7, name: '動物大趴踢', desc: '猜猜動物腳、繪本故事、動物派對', icon: 'help-circle' },
      { week: 8, name: '做伙來辦桌', desc: '烹飪體驗、繪本故事、合作料理', icon: 'book' },
      { week: 9, name: '食而聲笑', desc: '課程回顧、成果發表、歡樂結業', icon: 'award' },
    ];

    const iconSvgs = {
      sparkles: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>',
      handshake: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      heart: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>',
      lightbulb: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>',
      music: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
      book: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>',
      'help-circle': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      camera: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>',
      award: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>',
    };

    const grid = document.getElementById('courses-grid');
    grid.innerHTML = courses.map((c, i) => `
      <div class="course-card animate-fade-in" style="animation-delay:${i * 50}ms"
           onclick="location.href='course-detail.html?week=${c.week}'">
        <div class="course-icon"><img src="course-w${c.week}.png" alt="${c.name}"></div>
        <div class="course-info">
          <div class="course-week">第 ${c.week} 週</div>
          <div class="course-name">${c.name}</div>
          <div class="course-desc">${c.desc}</div>
        </div>
        <div class="course-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
