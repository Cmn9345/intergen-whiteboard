<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程詳情 - 代間共學互動平台</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .detail-header {
      padding: var(--space-xl);
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .detail-hero {
      padding: 0 var(--space-xl) var(--space-xl);
      max-width: 860px;
      margin: 0 auto;
    }

    .detail-hero-card {
      border-radius: var(--wobble-1);
      border: var(--border-width) solid var(--color-border);
      padding: var(--space-2xl);
      position: relative;
      box-shadow: var(--shadow-sketch);
    }

    .detail-hero-card h1 {
      font-size: var(--font-size-4xl);
      font-weight: 700;
      font-family: var(--font-heading);
      color: white;
      margin-bottom: var(--space-xs);
      transform: rotate(-0.5deg);
    }

    .detail-hero-card p {
      font-size: var(--font-size-xl);
      color: rgba(255,255,255,0.85);
    }

    .detail-week-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 8px 16px;
      border-radius: var(--wobble-2);
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      font-weight: 700;
      font-size: var(--font-size-base);
      font-family: var(--font-heading);
      margin-bottom: var(--space-md);
    }

    .activities {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 var(--space-xl) var(--space-2xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .activity-card {
      background: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      overflow: hidden;
      box-shadow: var(--shadow-sketch);
    }

    .activity-card:nth-child(1) { border-radius: var(--wobble-1); }
    .activity-card:nth-child(2) { border-radius: var(--wobble-2); }
    .activity-card:nth-child(3) { border-radius: var(--wobble-3); }

    .activity-header {
      padding: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .activity-header:hover {
      background: var(--color-surface);
    }

    .activity-indicator {
      width: 6px;
      height: 36px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .activity-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .activity-title {
      flex: 1;
      font-size: var(--font-size-xl);
      font-weight: 700;
      font-family: var(--font-heading);
    }

    .activity-duration {
      font-size: var(--font-size-base);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-heading);
    }

    .activity-chevron {
      color: var(--color-text-muted);
      transition: transform var(--transition-fast);
    }

    .activity-card.open .activity-chevron {
      transform: rotate(180deg);
    }

    .activity-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height var(--transition-slow);
    }

    .activity-card.open .activity-body {
      max-height: 600px;
    }

    .activity-content {
      padding: 0 var(--space-lg) var(--space-lg);
      padding-left: calc(var(--space-lg) + 6px + var(--space-md) + 48px + var(--space-md));
    }

    .activity-content ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .activity-content li {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      font-size: var(--font-size-lg);
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    .activity-content li::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      flex-shrink: 0;
      margin-top: 10px;
    }

    .activity-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      margin-top: var(--space-md);
      padding: 10px 20px;
      border-radius: var(--wobble-2);
      border: 2px solid var(--color-border);
      font-weight: 700;
      font-size: var(--font-size-base);
      font-family: var(--font-heading);
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sketch-sm);
    }

    .activity-link:hover {
      transform: translate(-1px, -1px);
      box-shadow: var(--shadow-sketch);
    }

    /* Color themes */
    .theme-green .activity-indicator { background: var(--color-marker-green); }
    .theme-green .activity-icon { background: var(--color-postit-green); color: var(--color-marker-green); }
    .theme-green .activity-link { background: var(--color-postit-green); }

    .theme-purple .activity-indicator { background: var(--color-marker-purple); }
    .theme-purple .activity-icon { background: #F0ECF8; color: var(--color-marker-purple); }
    .theme-purple .activity-link { background: #F0ECF8; }

    .theme-orange .activity-indicator { background: var(--color-marker-orange); }
    .theme-orange .activity-icon { background: var(--color-postit-yellow); color: var(--color-marker-orange); }
    .theme-orange .activity-link { background: var(--color-postit-yellow); }

    .theme-red .activity-indicator { background: var(--color-marker-red); }
    .theme-red .activity-icon { background: var(--color-postit-pink); color: var(--color-marker-red); }
    .theme-red .activity-link { background: var(--color-postit-pink); }

    .theme-blue .activity-indicator { background: var(--color-marker-blue); }
    .theme-blue .activity-icon { background: var(--color-postit-blue); color: var(--color-marker-blue); }
    .theme-blue .activity-link { background: var(--color-postit-blue); }

    .theme-teal .activity-indicator { background: var(--color-secondary); }
    .theme-teal .activity-icon { background: var(--color-secondary-lighter); color: var(--color-secondary-dark); }
    .theme-teal .activity-link { background: var(--color-secondary-lighter); }

    /* Hero backgrounds */
    .hero-green { background: linear-gradient(135deg, #4CAF50, #81C784); }
    .hero-purple { background: linear-gradient(135deg, #7E57C2, #B39DDB); }
    .hero-orange { background: linear-gradient(135deg, #FF9800, #FFB74D); }
    .hero-red { background: linear-gradient(135deg, #EF5350, #EF9A9A); }
    .hero-teal { background: linear-gradient(135deg, var(--color-secondary), var(--color-secondary-light)); }

    .detail-back {
      text-align: center;
      padding: 0 0 var(--space-2xl);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="detail-header">
      <a href="courses.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        所有課程
      </a>
    </div>

    <div class="detail-hero">
      <div class="detail-hero-card hero-green" id="hero-card">
        <div class="detail-week-badge" id="week-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          第 0 週
        </div>
        <h1 id="course-title">課程名稱</h1>
        <p id="course-desc">課程說明</p>
      </div>
    </div>

    <div class="activities" id="activities"></div>

    <div class="detail-back">
      <a href="courses.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        回到課程列表
      </a>
    </div>
  </div>

  <script>
    // Link mapping: activity link name -> actual URL (with week param where needed)
    function getActivityUrl(link, weekId) {
      const linkMap = {
        'ice-breaker': 'ice-breaker.html',
        'together': 'together.html',
        'storybook': `storybook.html?week=${weekId}`,
        'whiteboard-tutorial': 'whiteboard-tutorial.html',
        'find-partner': `find-partner.html?week=${weekId}`,
        'emotion-faces': 'emotion-faces.html',
        'emotion-wheel': 'emotion-wheel.html',
        'toolkit': 'toolkit.html',
        'family-quiz': 'family-quiz.html',
        'charades': 'charades.html',
        'talent-show': 'talent-show.html',
        'ensemble': 'ensemble.html',
        'toy-sharing': 'toy-sharing.html',
        'guess-feet': 'guess-feet.html',
      };
      return linkMap[link] || null;
    }

    const courseData = {
      1: {
        name: '相見歡', desc: '建立小默契、分組、破冰活動', hero: 'hero-green',
        activities: [
          { title: '破冰遊戲', theme: 'theme-green', duration: '20 分鐘', items: ['自我介紹時間：名字、最喜歡的顏色、食物、活動', '配對小遊戲，建立默契', '信任互動與鼓勵練習'], link: 'ice-breaker' },
          { title: '一起動一動', theme: 'theme-purple', duration: '15 分鐘', items: ['團體帶動唱：當我們同在一起', '簡單肢體律動', '祖孫一起跳'], link: 'together' },
          { title: '繪本故事', theme: 'theme-orange', duration: '15 分鐘', items: ['共讀繪本：做一個機器人假裝是我', '故事討論與心得分享', '延伸思考問題'], link: 'storybook' },
          { title: '白板教學', theme: 'theme-blue', duration: '10 分鐘', items: ['認識互動白板操作方式', '練習觸控點擊與滑動', '熟悉簽到與投票功能'], link: 'whiteboard-tutorial' },
        ]
      },
      2: {
        name: '心情溫度計', desc: '情緒探索、心情表達、情感連結', hero: 'hero-red',
        activities: [
          { title: '找夥伴', theme: 'theme-green', duration: '15 分鐘', items: ['動物配對遊戲：找出動物的幼年與成年配對', '烏龜、天鵝、雞、毛毛蟲等 9 種動物', '配對成功有音效回饋'], link: 'find-partner' },
          { title: '情緒表情', theme: 'theme-purple', duration: '15 分鐘', items: ['認識 5 種情緒：開心、難過、生氣、害怕、驚訝', '用表情表達情緒', '猜猜對方的心情'], link: 'emotion-faces' },
          { title: '情緒輪盤', theme: 'theme-red', duration: '20 分鐘', items: ['互動轉盤遊戲，隨機選出情緒', '語音播報情緒名稱', '分享情緒經驗與討論'], link: 'emotion-wheel' },
        ]
      },
      3: {
        name: '夢想經驗大碰撞', desc: '職業探索、繪本故事、夢想分享', hero: 'hero-purple',
        activities: [
          { title: '繪本故事', theme: 'theme-purple', duration: '15 分鐘', items: ['共讀職業相關繪本', '討論長大後想做什麼', '阿公阿嬤分享工作經驗'], link: 'storybook' },
          { title: '職業工具箱', theme: 'theme-orange', duration: '20 分鐘', items: ['認識 6 種職業：醫生、廚師、老師、警察、消防員、建築師', '配對職業與工具', '大人職業 vs 小小職業配對遊戲'], link: 'toolkit' },
        ]
      },
      4: {
        name: '我的家人', desc: '家人稱呼、你演我猜、家庭照', hero: 'hero-orange',
        activities: [
          { title: '找夥伴', theme: 'theme-green', duration: '15 分鐘', items: ['認識 8 種家人稱呼：爸爸、媽媽、阿公、阿嬤等', '看描述猜家人角色', '計分挑戰與音效回饋'], link: 'find-partner' },
          { title: '家庭小測驗', theme: 'theme-purple', duration: '15 分鐘', items: ['回答家庭趣味問題', '了解彼此的家庭故事', '分享家庭照片'], link: 'family-quiz' },
          { title: '比手畫腳', theme: 'theme-orange', duration: '15 分鐘', items: ['用肢體語言表達家人角色', '祖孫合作猜題', '觀察力與想像力訓練'], link: 'charades' },
        ]
      },
      5: {
        name: '功夫大比拼', desc: '才藝表演、合唱合奏、互相欣賞', hero: 'hero-red',
        activities: [
          { title: '才藝表演', theme: 'theme-red', duration: '25 分鐘', items: ['6 種才藝類別：唱歌、跳舞、說故事、繪畫手工、運動技能、樂器演奏', '小朋友 vs 長輩表演', '2-3 分鐘表演時間，觀眾互動'], link: 'talent-show' },
          { title: '合唱合奏', theme: 'theme-blue', duration: '20 分鐘', items: ['河馬歌、A Ram Sam Sam 等 6 首歌曲', '搭配 YouTube 影片一起唱', '擁抱世界擁抱你、人人做環保、捏泥巴、丟丟銅仔'], link: 'ensemble' },
        ]
      },
      6: {
        name: '玩具時光機', desc: '古早玩具、現代玩具、傳統遊戲', hero: 'hero-teal',
        activities: [
          { title: '玩具分享', theme: 'theme-teal', duration: '20 分鐘', items: ['古早玩具：陀螺、毽子、竹蜻蜓、彈珠、跳房子、翻花繩', '現代玩具：樂高、芭比娃娃、遙控車、電子遊戲、拼圖、魔術方塊', '祖孫互相介紹自己時代的玩具'], link: 'toy-sharing' },
          { title: '繪本故事', theme: 'theme-purple', duration: '15 分鐘', items: ['共讀玩具相關繪本', '討論最喜歡的玩具與回憶', '分享玩具背後的故事'], link: 'storybook' },
        ]
      },
      7: {
        name: '動物大趴踢', desc: '猜猜動物腳、繪本故事、動物派對', hero: 'hero-green',
        activities: [
          { title: '猜猜動物腳', theme: 'theme-green', duration: '20 分鐘', items: ['10 種動物：斑馬、長頸鹿、兔子、雞、鴨、豬、熊、大象、貓、狗', '猜猜是 2 隻腳還是 4 隻腳', '30 秒計時挑戰，語音播報答案'], link: 'guess-feet' },
          { title: '繪本故事', theme: 'theme-orange', duration: '15 分鐘', items: ['共讀動物相關繪本', '認識不同動物的特徵', '最喜歡的動物分享'], link: 'storybook' },
        ]
      },
      8: {
        name: '做伙來辦桌', desc: '烹飪體驗、繪本故事、合作料理', hero: 'hero-orange',
        activities: [
          { title: '繪本故事', theme: 'theme-orange', duration: '15 分鐘', items: ['共讀料理相關繪本', '阿公阿嬤的拿手菜分享', '討論家裡過年過節的菜色'], link: 'storybook' },
          { title: '合作料理', theme: 'theme-green', duration: '25 分鐘', items: ['祖孫一起準備簡單料理', '認識食材與烹飪步驟', '擺盤與分享美食'], link: null },
        ]
      },
      9: {
        name: '食而聲笑', desc: '課程回顧、成果發表、歡樂結業', hero: 'hero-purple',
        activities: [
          { title: '課程回顧', theme: 'theme-purple', duration: '15 分鐘', items: ['回顧 9 週精彩活動照片', '最喜歡的課程票選', '分享學到最多的事情'], link: null },
          { title: '成果發表', theme: 'theme-green', duration: '20 分鐘', items: ['各組上台分享收穫', '祖孫一起表演或展示作品', '頒發結業證書'], link: null },
          { title: '歡樂時光', theme: 'theme-orange', duration: '15 分鐘', items: ['大家一起享用點心', '互相祝福與合照留念', '期待下次再見'], link: null },
        ]
      },
    };

    const params = new URLSearchParams(window.location.search);
    const weekId = parseInt(params.get('week')) || 1;
    const course = courseData[weekId] || courseData[1];

    document.getElementById('hero-card').className = `detail-hero-card ${course.hero}`;
    document.getElementById('week-badge').innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      第 ${weekId} 週`;
    document.getElementById('course-title').textContent = course.name;
    document.getElementById('course-desc').textContent = course.desc;
    document.title = `${course.name} - 代間共學互動平台`;

    const actIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';
    const chevron = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
    const arrow = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

    document.getElementById('activities').innerHTML = course.activities.map((a, i) => `
      <div class="activity-card ${a.theme} ${i === 0 ? 'open' : ''}" onclick="toggleActivity(this)">
        <div class="activity-header">
          <div class="activity-indicator"></div>
          <div class="activity-icon">${actIcon}</div>
          <div class="activity-title">${a.title}</div>
          <div class="activity-duration">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${a.duration}
          </div>
          <div class="activity-chevron">${chevron}</div>
        </div>
        <div class="activity-body">
          <div class="activity-content">
            <ul>${a.items.map(item => `<li>${item}</li>`).join('')}</ul>
            ${a.link && getActivityUrl(a.link, weekId) ? `<a class="activity-link" href="${getActivityUrl(a.link, weekId)}" onclick="event.stopPropagation()">前往活動 ${arrow}</a>` : ''}
          </div>
        </div>
      </div>
    `).join('');

    function toggleActivity(card) {
      card.classList.toggle('open');
    }
  </script>
</body>
</html>
