<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人員登入 - 代間共學互動平台</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
    }

    .login-container {
      width: 100%;
      max-width: 520px;
    }

    .login-card {
      background: var(--color-bg-card);
      border-radius: var(--wobble-1);
      border: var(--border-width) solid var(--color-border);
      padding: var(--space-2xl);
      box-shadow: var(--shadow-sketch);
      position: relative;
    }

    /* Tape decoration */
    .login-card::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 80px;
      height: 24px;
      background: rgba(255,249,196,0.75);
      border: 1px solid rgba(200,180,120,0.4);
      z-index: 2;
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .login-header .icon-box {
      margin: 0 auto var(--space-md);
    }

    .login-header h2 {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      font-family: var(--font-heading);
    }

    .login-header p {
      color: var(--color-text-muted);
      font-size: var(--font-size-lg);
      margin-top: var(--space-xs);
    }

    /* Step 1: Account Selection */
    .account-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
    }

    .account-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-lg);
      border-radius: var(--wobble-2);
      border: var(--border-width) solid var(--color-border);
      background: var(--color-bg-card);
      cursor: pointer;
      transition: all var(--transition-fast);
      min-height: 120px;
      box-shadow: var(--shadow-sketch-sm);
      font-family: var(--font-heading);
    }

    .account-btn:nth-child(odd) { transform: rotate(-0.5deg); }
    .account-btn:nth-child(even) { transform: rotate(0.5deg); }

    .account-btn:hover {
      background: var(--color-postit-yellow);
      transform: translate(-2px, -2px) rotate(0deg);
      box-shadow: var(--shadow-sketch);
    }

    .account-btn:active {
      transform: translate(2px, 2px);
      box-shadow: var(--shadow-sketch-pressed);
    }

    .account-btn .avatar {
      width: 64px;
      height: 64px;
      font-size: var(--font-size-2xl);
    }

    .account-btn span {
      font-size: var(--font-size-xl);
      font-weight: 700;
    }

    /* Step 2: PIN Input */
    .pin-section {
      text-align: center;
    }

    .selected-user {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      padding: var(--space-md);
      background: var(--color-postit-yellow);
      border: 2px solid var(--color-border);
      border-radius: var(--wobble-3);
      margin-bottom: var(--space-xl);
    }

    .selected-user-name {
      font-size: var(--font-size-xl);
      font-weight: 700;
      font-family: var(--font-heading);
    }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: var(--space-xl);
      margin-bottom: var(--space-xl);
    }

    .pin-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: var(--border-width) solid var(--color-border);
      background: transparent;
      transition: all var(--transition-fast);
    }

    .pin-dot.filled {
      background: var(--color-primary);
      border-color: var(--color-marker-black);
      transform: scale(1.15);
    }

    .pin-dot.error {
      background: var(--color-danger);
      border-color: var(--color-danger);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      max-width: 340px;
      margin: 0 auto;
    }

    .num-btn {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: var(--border-width) solid var(--color-border);
      background: var(--color-bg-card);
      font-size: var(--font-size-2xl);
      font-weight: 700;
      font-family: var(--font-heading);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      box-shadow: var(--shadow-sketch-sm);
    }

    .num-btn:hover {
      background: var(--color-postit-yellow);
      transform: translate(-1px, -1px);
      box-shadow: var(--shadow-sketch);
    }

    .num-btn:active {
      background: var(--color-primary);
      color: white;
      transform: translate(2px, 2px);
      box-shadow: var(--shadow-sketch-pressed);
    }

    .num-btn-action {
      border: 2px dashed var(--color-border-light);
      box-shadow: none;
      color: var(--color-text-muted);
      font-size: var(--font-size-base);
    }

    .num-btn-action:hover {
      color: var(--color-text-primary);
      background: var(--color-surface);
      border-style: solid;
    }

    /* Step 3: Result */
    .result-section {
      text-align: center;
      padding: var(--space-xl) 0;
    }

    .result-icon {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: var(--border-width) solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-lg);
    }

    .result-icon.success {
      background: var(--color-success-light);
      color: var(--color-success);
      animation: celebrate 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .result-icon.fail {
      background: var(--color-angry-light);
      color: var(--color-danger);
    }

    .result-msg {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      font-family: var(--font-heading);
      margin-bottom: var(--space-sm);
    }

    .result-sub {
      color: var(--color-text-muted);
      font-size: var(--font-size-lg);
    }

    .login-back {
      text-align: center;
      margin-top: var(--space-lg);
    }

    .step-hidden { display: none; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <!-- Step 1: Select Account -->
        <div id="step-select">
          <div class="login-header">
            <div class="icon-box icon-box-primary icon-box-lg" style="margin:0 auto var(--space-md)">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <h2>人員登入</h2>
            <p>請選擇您的帳號</p>
          </div>
          <div id="account-list" class="account-grid stagger">
            <div class="loading-container">
              <div class="spinner"></div>
              <span>載入帳號中...</span>
            </div>
          </div>
        </div>

        <!-- Step 2: PIN Input -->
        <div id="step-pin" class="step-hidden">
          <div class="login-header">
            <h2>輸入 PIN 碼</h2>
          </div>
          <div class="pin-section">
            <div class="selected-user">
              <div class="avatar" id="pin-avatar"></div>
              <span class="selected-user-name" id="pin-username"></span>
              <button class="btn btn-ghost" onclick="goBackToSelect()" title="重新選擇" style="box-shadow:none;border:none;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div class="pin-dots" id="pin-dots">
              <div class="pin-dot"></div>
              <div class="pin-dot"></div>
              <div class="pin-dot"></div>
              <div class="pin-dot"></div>
            </div>
            <div class="numpad">
              <button class="num-btn" onclick="enterDigit('1')">1</button>
              <button class="num-btn" onclick="enterDigit('2')">2</button>
              <button class="num-btn" onclick="enterDigit('3')">3</button>
              <button class="num-btn" onclick="enterDigit('4')">4</button>
              <button class="num-btn" onclick="enterDigit('5')">5</button>
              <button class="num-btn" onclick="enterDigit('6')">6</button>
              <button class="num-btn" onclick="enterDigit('7')">7</button>
              <button class="num-btn" onclick="enterDigit('8')">8</button>
              <button class="num-btn" onclick="enterDigit('9')">9</button>
              <button class="num-btn num-btn-action" onclick="clearPin()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
              </button>
              <button class="num-btn" onclick="enterDigit('0')">0</button>
              <button class="num-btn num-btn-action" onclick="deleteDigit()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Step 3: Result -->
        <div id="step-result" class="step-hidden">
          <div class="result-section">
            <div class="result-icon" id="result-icon"></div>
            <div class="result-msg" id="result-msg"></div>
            <div class="result-sub" id="result-sub"></div>
          </div>
        </div>
      </div>

      <div class="login-back">
        <a href="index.html" class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          返回首頁
        </a>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    let accounts = [];
    let selectedUser = null;
    let pin = '';

    async function init() {
      const students = await api.getStudents();
      if (!students) {
        document.getElementById('account-list').innerHTML =
          '<div class="empty-state" style="grid-column:1/-1"><p>無法載入帳號資料</p></div>';
        return;
      }
      accounts = students;
      renderAccounts();
    }

    function renderAccounts() {
      const grid = document.getElementById('account-list');
      grid.innerHTML = accounts.map((u, i) => `
        <button class="account-btn animate-fade-in" onclick="selectUser(${i})" style="animation-delay:${i * 60}ms">
          <div class="avatar">${(u.Name || u.name || '?')[0]}</div>
          <span>${u.Name || u.name}</span>
        </button>
      `).join('');
    }

    function selectUser(index) {
      selectedUser = accounts[index];
      pin = '';
      document.getElementById('pin-avatar').textContent = (selectedUser.Name || selectedUser.name)[0];
      document.getElementById('pin-username').textContent = selectedUser.Name || selectedUser.name;
      showStep('step-pin');
      updateDots();
    }

    function enterDigit(d) {
      if (pin.length >= 4) return;
      pin += d;
      updateDots();
      if (pin.length === 4) {
        setTimeout(verifyPin, 200);
      }
    }

    function deleteDigit() {
      pin = pin.slice(0, -1);
      updateDots();
    }

    function clearPin() {
      pin = '';
      updateDots();
    }

    function updateDots() {
      const dots = document.querySelectorAll('#pin-dots .pin-dot');
      dots.forEach((dot, i) => {
        dot.className = 'pin-dot' + (i < pin.length ? ' filled' : '');
      });
    }

    function verifyPin() {
      const correct = selectedUser.password || selectedUser.pin || '0000';
      if (pin === correct) {
        showResult(true);
      } else {
        document.querySelectorAll('#pin-dots .pin-dot').forEach(d => d.classList.add('error'));
        setTimeout(() => {
          pin = '';
          updateDots();
        }, 500);
      }
    }

    function showResult(success) {
      const iconEl = document.getElementById('result-icon');
      const msgEl = document.getElementById('result-msg');
      const subEl = document.getElementById('result-sub');

      if (success) {
        iconEl.className = 'result-icon success';
        iconEl.innerHTML = '<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        msgEl.textContent = '登入成功';
        subEl.textContent = `歡迎回來，${selectedUser.Name || selectedUser.name}`;
        localStorage.setItem('currentUser', JSON.stringify(selectedUser));
        setTimeout(() => location.href = 'dashboard.html', 1500);
      } else {
        iconEl.className = 'result-icon fail';
        iconEl.innerHTML = '<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        msgEl.textContent = 'PIN 碼錯誤';
        subEl.textContent = '請重新嘗試';
      }
      showStep('step-result');
    }

    function goBackToSelect() {
      selectedUser = null;
      pin = '';
      showStep('step-select');
    }

    function showStep(id) {
      ['step-select', 'step-pin', 'step-result'].forEach(s => {
        document.getElementById(s).classList.toggle('step-hidden', s !== id);
      });
    }

    init();
  </script>
</body>
</html>
