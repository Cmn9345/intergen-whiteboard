<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代間共學互動平台</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .hero {
      text-align: center;
      padding: var(--space-3xl) var(--space-xl) var(--space-xl);
    }

    .hero-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto var(--space-lg);
      background: var(--color-postit-yellow);
      border: var(--border-width) solid var(--color-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-marker-black);
      box-shadow: var(--shadow-sketch);
      transform: rotate(-2deg);
    }

    .hero h1 {
      font-size: var(--font-size-5xl);
      font-weight: 700;
      color: var(--color-text-primary);
      font-family: var(--font-heading);
      transform: rotate(-0.5deg);
      margin-bottom: var(--space-sm);
    }

    .hero p {
      font-size: var(--font-size-xl);
      color: var(--color-text-secondary);
      font-family: var(--font-heading);
    }

    /* Marker-style underline on title */
    .hero h1 span {
      position: relative;
      display: inline-block;
    }
    .hero h1 span::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: -6px;
      right: -6px;
      height: 10px;
      background: var(--color-happy);
      opacity: 0.4;
      border-radius: 4px;
      transform: rotate(-0.5deg);
      z-index: -1;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-xl);
      max-width: 800px;
      margin: var(--space-2xl) auto 0;
      padding: 0 var(--space-xl);
    }

    .feature-card {
      background: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      padding: var(--space-lg) var(--space-lg) var(--space-md);
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sketch);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* Wobbly borders per card */
    .feature-card:nth-child(1) {
      border-radius: var(--wobble-1);
      transform: rotate(-1deg);
    }
    .feature-card:nth-child(2) {
      border-radius: var(--wobble-2);
      transform: rotate(0.8deg);
    }
    .feature-card:nth-child(3) {
      border-radius: var(--wobble-3);
      transform: rotate(0.5deg);
    }
    .feature-card:nth-child(4) {
      border-radius: var(--wobble-4);
      transform: rotate(-0.6deg);
    }

    .feature-card:hover {
      transform: translate(-3px, -3px) rotate(0deg);
      box-shadow: var(--shadow-sketch-hover);
    }

    .feature-card:active {
      transform: translate(2px, 2px) rotate(0deg);
      box-shadow: var(--shadow-sketch-pressed);
    }

    /* Tape decoration */
    .feature-card:nth-child(1)::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 24px;
      width: 56px;
      height: 22px;
      background: rgba(255,249,196,0.75);
      border: 1px solid rgba(200,180,120,0.4);
      transform: rotate(-5deg);
      z-index: 2;
    }
    .feature-card:nth-child(3)::before {
      content: '';
      position: absolute;
      top: -10px;
      right: 24px;
      width: 56px;
      height: 22px;
      background: rgba(216,236,255,0.75);
      border: 1px solid rgba(120,160,200,0.4);
      transform: rotate(4deg);
      z-index: 2;
    }

    /* Post-it color backgrounds */
    .feature-card:nth-child(1) { background: var(--color-postit-blue); }
    .feature-card:nth-child(2) { background: var(--color-postit-yellow); }
    .feature-card:nth-child(3) { background: var(--color-postit-green); }
    .feature-card:nth-child(4) { background: var(--color-postit-pink); }

    .feature-icon {
      width: 180px;
      height: 180px;
      border-radius: var(--wobble-2);
      border: var(--border-width) solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-sm);
      background: var(--color-bg-card);
      overflow: hidden;
      box-shadow: var(--shadow-sketch-sm);
      flex-shrink: 0;
    }

    .feature-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .feature-text {
      margin-top: auto;
    }

    .feature-card h3 {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      font-family: var(--font-heading);
      margin-bottom: 2px;
    }

    .feature-card p {
      font-size: var(--font-size-lg);
      color: var(--color-text-secondary);
      margin-bottom: 0;
    }

    .feature-arrow {
      margin-top: var(--space-xs);
      color: var(--color-text-muted);
      transition: transform var(--transition-fast);
    }

    .feature-card:hover .feature-arrow {
      transform: translateX(6px);
      color: var(--color-marker-black);
    }

    .footer-info {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--color-text-muted);
      font-family: var(--font-heading);
      font-size: var(--font-size-base);
    }

    @media (max-width: 600px) {
      .feature-grid {
        grid-template-columns: 1fr;
        gap: var(--space-lg);
      }
      .hero h1 { font-size: var(--font-size-3xl); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="hero-icon animate-scale-in">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <h1><span>代間共學互動平台</span></h1>
      <p>讓祖孫一起學習、一起歡笑</p>
    </div>

    <div class="feature-grid stagger">
      <div class="feature-card animate-fade-in" onclick="location.href='checkin-tree.html'">
        <div class="feature-icon">
          <img src="icon-tree.png" alt="簽到樹">
        </div>
        <div class="feature-text">
          <h3>簽到樹</h3>
          <p>點擊大樹完成簽到</p>
          <div class="feature-arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </div>
      </div>

      <div class="feature-card animate-fade-in" onclick="location.href='mood.html'">
        <div class="feature-icon">
          <img src="icon-thermometer.png" alt="心情溫度計">
        </div>
        <div class="feature-text">
          <h3>心情溫度計</h3>
          <p>今天心情如何呢</p>
          <div class="feature-arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </div>
      </div>

      <div class="feature-card animate-fade-in" onclick="location.href='courses.html'">
        <div class="feature-icon">
          <img src="icon-book.png" alt="課程內容">
        </div>
        <div class="feature-text">
          <h3>課程內容</h3>
          <p>每週精彩活動</p>
          <div class="feature-arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </div>
      </div>

      <div class="feature-card animate-fade-in" onclick="location.href='login.html'">
        <div class="feature-icon">
          <img src="icon-lock.png" alt="人員登入">
        </div>
        <div class="feature-text">
          <h3>人員登入</h3>
          <p>管理員與教師入口</p>
          <div class="feature-arrow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-info">
      代間共學互動平台 &copy; 2026
    </div>
  </div>
</body>
</html>
