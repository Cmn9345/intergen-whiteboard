<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心情統計 - 代間共學互動平台</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .stats-page {
      min-height: 100vh;
    }

    .stats-header {
      padding: var(--space-lg) var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stats-header-left {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .stats-header-actions {
      display: flex;
      gap: var(--space-sm);
    }

    .stats-body {
      padding: 0 var(--space-xl) var(--space-xl);
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Week tabs */
    .week-tabs {
      display: flex;
      gap: var(--space-xs);
      background: var(--color-surface);
      border: 2px solid var(--color-border-light);
      padding: 6px;
      border-radius: var(--wobble-1);
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
    }

    .week-tab {
      padding: 10px 20px;
      border-radius: var(--wobble-2);
      font-weight: 700;
      font-size: var(--font-size-base);
      font-family: var(--font-heading);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 2px solid transparent;
    }

    .week-tab:hover { color: var(--color-text-secondary); }
    .week-tab.active {
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      border-color: var(--color-border);
      box-shadow: var(--shadow-sketch-sm);
    }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .summary-card {
      background: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      padding: var(--space-lg);
      box-shadow: var(--shadow-sketch-sm);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .summary-card:nth-child(1) { border-radius: var(--wobble-1); background: var(--color-postit-blue); }
    .summary-card:nth-child(2) { border-radius: var(--wobble-2); background: var(--color-happy-light); }
    .summary-card:nth-child(3) { border-radius: var(--wobble-3); background: var(--color-sad-light); }
    .summary-card:nth-child(4) { border-radius: var(--wobble-4); background: var(--color-angry-light); }

    .summary-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--color-bg-card);
    }

    .summary-value {
      font-size: var(--font-size-3xl);
      font-weight: 700;
      font-family: var(--font-heading);
      line-height: 1;
    }

    .summary-label {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      margin-top: 4px;
      font-family: var(--font-heading);
    }

    /* Detail list sections */
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-lg);
    }

    .detail-section {
      background: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      box-shadow: var(--shadow-sketch);
      overflow: hidden;
    }

    .detail-section:nth-child(1) { border-radius: var(--wobble-1); }
    .detail-section:nth-child(2) { border-radius: var(--wobble-2); }
    .detail-section:nth-child(3) { border-radius: var(--wobble-3); }

    .detail-section-header {
      padding: var(--space-md) var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-weight: 700;
      font-size: var(--font-size-xl);
      font-family: var(--font-heading);
      border-bottom: var(--border-width) solid var(--color-border);
    }

    .detail-section-happy .detail-section-header { background: var(--color-happy-light); }
    .detail-section-sad .detail-section-header { background: var(--color-sad-light); }
    .detail-section-angry .detail-section-header { background: var(--color-angry-light); }

    .detail-section-count {
      margin-left: auto;
      font-size: var(--font-size-base);
      color: var(--color-text-muted);
      font-weight: 500;
    }

    .detail-list {
      padding: var(--space-sm);
      max-height: 400px;
      overflow-y: auto;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--wobble-3);
      transition: background var(--transition-fast);
      font-size: var(--font-size-lg);
    }

    .detail-item:hover {
      background: var(--color-surface);
    }

    .detail-item-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-base);
      font-weight: 700;
      font-family: var(--font-heading);
      flex-shrink: 0;
    }

    .detail-section-happy .detail-item-num { background: var(--color-happy-light); }
    .detail-section-sad .detail-item-num { background: var(--color-sad-light); }
    .detail-section-angry .detail-item-num { background: var(--color-angry-light); }

    .detail-item-name {
      font-weight: 700;
      font-family: var(--font-heading);
      flex: 1;
    }

    .detail-item-group {
      font-size: var(--font-size-base);
      color: var(--color-text-muted);
    }

    .detail-empty {
      padding: var(--space-xl);
      text-align: center;
      color: var(--color-text-muted);
      font-family: var(--font-heading);
      font-size: var(--font-size-lg);
    }

    @media (max-width: 768px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="stats-page">
    <div class="stats-header">
      <div class="stats-header-left">
        <a href="dashboard.html" class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          儀表板
        </a>
        <h1 class="page-title">心情統計</h1>
      </div>
      <div class="stats-header-actions">
        <button class="btn btn-outline" onclick="loadData()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          重新整理
        </button>
      </div>
    </div>

    <div class="stats-body">
      <div class="week-tabs" id="week-tabs"></div>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-icon" style="color:var(--color-text-secondary)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div>
            <div class="summary-value" id="s-total">0</div>
            <div class="summary-label">總投票數</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-icon" style="color:#B8860B">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </div>
          <div>
            <div class="summary-value" id="s-happy">0</div>
            <div class="summary-label">開心</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-icon" style="color:var(--color-sad)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </div>
          <div>
            <div class="summary-value" id="s-sad">0</div>
            <div class="summary-label">難過</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-icon" style="color:var(--color-angry)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><path d="M7.5 8 10 9"/><path d="M16.5 8 14 9"/></svg>
          </div>
          <div>
            <div class="summary-value" id="s-angry">0</div>
            <div class="summary-label">生氣</div>
          </div>
        </div>
      </div>

      <div class="detail-grid">
        <div class="detail-section detail-section-happy">
          <div class="detail-section-header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            開心
            <span class="detail-section-count" id="c-happy">0 人</span>
          </div>
          <div class="detail-list" id="list-happy">
            <div class="detail-empty">尚無資料</div>
          </div>
        </div>

        <div class="detail-section detail-section-sad">
          <div class="detail-section-header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            難過
            <span class="detail-section-count" id="c-sad">0 人</span>
          </div>
          <div class="detail-list" id="list-sad">
            <div class="detail-empty">尚無資料</div>
          </div>
        </div>

        <div class="detail-section detail-section-angry">
          <div class="detail-section-header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><path d="M7.5 8 10 9"/><path d="M16.5 8 14 9"/></svg>
            生氣
            <span class="detail-section-count" id="c-angry">0 人</span>
          </div>
          <div class="detail-list" id="list-angry">
            <div class="detail-empty">尚無資料</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    let currentWeek = 1;

    function renderWeekTabs() {
      const container = document.getElementById('week-tabs');
      let html = '';
      for (let w = 1; w <= 9; w++) {
        html += `<button class="week-tab ${w === currentWeek ? 'active' : ''}" onclick="switchWeek(${w})">第 ${w} 週</button>`;
      }
      container.innerHTML = html;
    }

    async function switchWeek(w) {
      currentWeek = w;
      renderWeekTabs();
      await loadData();
    }

    async function loadData() {
      const moods = await api.getMoods(String(currentWeek));

      const happy = moods.filter(m => m.emotional && (m.emotional.includes('happy') || m.emotional.includes('sun')));
      const sad = moods.filter(m => m.emotional && (m.emotional.includes('sad') || m.emotional.includes('cloudy')));
      const angry = moods.filter(m => m.emotional && (m.emotional.includes('angry') || m.emotional.includes('storm') || m.emotional.includes('rain')));

      document.getElementById('s-total').textContent = moods.length;
      document.getElementById('s-happy').textContent = happy.length;
      document.getElementById('s-sad').textContent = sad.length;
      document.getElementById('s-angry').textContent = angry.length;

      document.getElementById('c-happy').textContent = `${happy.length} 人`;
      document.getElementById('c-sad').textContent = `${sad.length} 人`;
      document.getElementById('c-angry').textContent = `${angry.length} 人`;

      renderList('list-happy', happy);
      renderList('list-sad', sad);
      renderList('list-angry', angry);
    }

    function renderList(containerId, items) {
      const container = document.getElementById(containerId);
      if (items.length === 0) {
        container.innerHTML = '<div class="detail-empty">尚無資料</div>';
        return;
      }
      container.innerHTML = items.map((m, i) => `
        <div class="detail-item">
          <div class="detail-item-num">${i + 1}</div>
          <div class="detail-item-name">${m.Name || '未知'}</div>
          <div class="detail-item-group">第 ${m.group || '?'} 組</div>
        </div>
      `).join('');
    }

    renderWeekTabs();
    loadData();
  </script>
</body>
</html>
