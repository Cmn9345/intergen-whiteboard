    <!-- trunk -->
    <path d="M800 880 C 760 620, 780 520, 800 460 C 820 520, 840 620, 800 880 Z"/>
    <!-- main branches -->
    <path d="M800 480 Q 620 420 480 560" stroke-width="16" fill="none"/>
    <path d="M800 500 Q 980 420 1140 560" stroke-width="16" fill="none"/>
    <path d="M800 460 Q 700 360 560 340" stroke-width="12" fill="none"/>
    <path d="M800 460 Q 900 360 1040 330" stroke-width="12" fill="none"/>
    <path d="M790 520 Q 640 520 520 640" stroke-width="10" fill="none"/>
