<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <!-- 黑色背景 -->
  <rect width="1600" height="900" fill="#000000"/>
  
  <!-- 主要樹幹 - 深紅棕色，帶有深淺變化 -->
  <path d="M800 880 C 760 700, 780 600, 800 480 C 820 600, 840 700, 800 880 Z" 
        fill="#6B3410" 
        stroke="#5B2E0A" 
        stroke-width="2"/>
  
  <!-- 樹幹陰影和紋理 -->
  <path d="M795 880 C 755 700, 775 600, 795 480 C 815 600, 835 700, 795 880 Z" 
        fill="#8B4513" 
