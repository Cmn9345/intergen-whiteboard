        stroke="#6B3410" 
        stroke-width="18" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M790 520 Q 600 520 480 640" 
        stroke="#6B3410" 
        stroke-width="16" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
