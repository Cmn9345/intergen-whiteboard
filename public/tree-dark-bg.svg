        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M520 340 Q 480 300 440 280" 
        stroke="#6B3410" 
        stroke-width="10" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M480 640 Q 450 600 420 580" 
