        stroke-width="6" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M1000 500 Q 1020 460 1040 440" 
        stroke="#6B3410" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M680 360 Q 640 340 620 320" 
        stroke="#6B3410" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M920 360 Q 960 340 980 320" 
        stroke="#6B3410" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round"
