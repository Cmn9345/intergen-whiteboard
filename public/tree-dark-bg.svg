        stroke-width="8" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- 細分支條 - 右側 -->
  <path d="M1180 560 Q 1220 500 1250 480" 
        stroke="#6B3410" 
        stroke-width="10" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M1080 330 Q 1120 290 1160 270" 
