  <!-- 左側主要枝幹 -->
  <path d="M800 500 Q 580 420 420 560" 
        stroke="#6B3410" 
        stroke-width="22" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
