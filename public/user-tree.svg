<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 黑色背景 -->
  <rect width="800" height="600" fill="#000000"/>
  
  <!-- 樹木主體 - 深紅棕色帶綠色光暈 -->
  <g>
    <!-- 樹幹 - 粗壯扭曲的主幹 -->
    <path d="M400 580 C 380 450, 390 350, 400 280 C 410 350, 420 450, 400 580 Z" 
          fill="#8B4513" 
          stroke="#654321" 
          stroke-width="6"
          class="clickable-trunk"/>
    
    <!-- 主要枝條 - 從樹幹分叉 -->
    <!-- 左側主要枝條 -->
    <path d="M400 280 Q 250 220, 150 350" 
          stroke="#8B4513" 
          stroke-width="16" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <!-- 右側主要枝條 -->
    <path d="M400 280 Q 550 220, 650 350" 
          stroke="#8B4513" 
          stroke-width="16" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <!-- 中上部分枝條 -->
    <path d="M400 280 Q 320 200, 200 180" 
          stroke="#8B4513" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <path d="M400 280 Q 480 200, 600 180" 
          stroke="#8B4513" 
          stroke-width="12" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <!-- 細分支條 -->
    <path d="M390 300 Q 280 300, 180 420" 
          stroke="#8B4513" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <path d="M410 300 Q 520 300, 620 420" 
          stroke="#8B4513" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <!-- 更多細分支條 -->
    <path d="M350 250 Q 300 230, 250 270" 
          stroke="#8B4513" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <path d="M450 250 Q 500 230, 550 270" 
          stroke="#8B4513" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <!-- 頂部分支 -->
    <path d="M400 280 Q 360 180, 320 150" 
          stroke="#8B4513" 
          stroke-width="10" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <path d="M400 280 Q 440 180, 480 150" 
          stroke="#8B4513" 
          stroke-width="10" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <!-- 最細的分支 -->
    <path d="M320 150 Q 280 130, 240 120" 
          stroke="#8B4513" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
    
    <path d="M480 150 Q 520 130, 560 120" 
          stroke="#8B4513" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round"
          class="clickable-branch"
          data-branch="true"/>
  </g>
  
  <!-- 綠色光暈效果 -->
  <g opacity="0.3">
    <!-- 樹幹光暈 -->
    <path d="M400 580 C 380 450, 390 350, 400 280 C 410 350, 420 450, 400 580 Z" 
          fill="none" 
          stroke="#00FF00" 
          stroke-width="8"/>
    
    <!-- 主要枝條光暈 -->
    <path d="M400 280 Q 250 220, 150 350" 
          stroke="#00FF00" 
          stroke-width="20" 
          fill="none" 
          stroke-linecap="round"/>
    
    <path d="M400 280 Q 550 220, 650 350" 
          stroke="#00FF00" 
          stroke-width="20" 
          fill="none" 
          stroke-linecap="round"/>
    
    <path d="M400 280 Q 320 200, 200 180" 
          stroke="#00FF00" 
          stroke-width="16" 
          fill="none" 
          stroke-linecap="round"/>
    
    <path d="M400 280 Q 480 200, 600 180" 
          stroke="#00FF00" 
          stroke-width="16" 
          fill="none" 
          stroke-linecap="round"/>
  </g>
</svg>














